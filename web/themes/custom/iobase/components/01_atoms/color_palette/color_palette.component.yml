'$schema': 'https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json'
name: Color Palette
status: stable
description: Displays a color swatch with label for color palette documentation.
libraryOverrides:
  dependencies:
    - core/drupal
props:
  type: object
  required:
    - color
    - text
  properties:
    color:
      type: string
      title: Color
      description: HTML color code (e.g. #1E6FA8, rgb(30, 111, 168)).
    text:
      type: string
      title: Text
      description: Label displayed below the color box.
