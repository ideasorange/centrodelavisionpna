'$schema': 'https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json'
name: Button
status: stable
description: Accessible submit/action button with CTA-aligned variants (for forms and embeds). Optional attributes may be passed from Twig when embedding from Form API templates.
libraryOverrides:
  dependencies:
    - core/drupal
props:
  type: object
  required:
    - label
  properties:
    label:
      type: string
      title: Label
      description: Visible button text.
    variant:
      type: string
      title: Variant
      description: Visual style variant.
      enum:
        - primary
        - secondary
        - tertiary
        - primary-outline
        - secondary-outline
        - tertiary-outline
        - outline
      default: primary
