'$schema': 'https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json'
name: Logo Brand
status: stable
description: Brand logo atom with configurable image and URL.
libraryOverrides:
  dependencies:
    - core/drupal
props:
  type: object
  required:
    - image
  properties:
    image:
      type: string
      title: Image URL
      description: Logo image URL (absolute or relative).
    alt:
      type: string
      title: Alt text
      description: Alternative text for accessibility.
    url:
      type: string
      title: URL
      description: Link target (e.g. front page or external URL).
      default: '/'
