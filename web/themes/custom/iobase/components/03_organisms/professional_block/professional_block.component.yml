$schema: 'https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json'
name: Professional Block
status: stable
description: Wrapper for rendering a list of professional/doctor cards in a responsive block.
libraryOverrides:
  dependencies:
    - core/drupal
props:
  type: object
  properties:
    heading:
      type: string
      title: Heading
      description: Optional block heading.
slots:
  items:
    title: Items
    description: List of rendered professional cards (typically provided by UI Patterns Views row plugin).

