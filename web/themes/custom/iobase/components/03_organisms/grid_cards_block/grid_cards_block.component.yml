$schema: 'https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json'
name: Grid Cards Block
status: stable
description: Wrapper for rendering a list of cards in a responsive block.
libraryOverrides:
  dependencies:
    - core/drupal
props:
  type: object
  properties:
    heading:
      type: string
      title: Heading
      description: Optional block heading.
    cta_text:
      type: string
      title: CTA Text
      description: Optional CTA text.
    cta_url:
      type: string
      title: CTA URL
      description: Optional CTA URL.
    cta_target:
      type: string
      title: CTA Target
      description: Optional CTA target.
      enum:
        - _self
        - _blank
      default: _self
slots:
  items:
    title: Items
    description: List of rendered professional cards (typically provided by UI Patterns Views row plugin).

