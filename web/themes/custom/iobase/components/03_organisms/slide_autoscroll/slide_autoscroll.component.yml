$schema: 'https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json'
name: 'Slide autoscroll'
status: stable
description: 'Horizontal Splide track with AutoScroll (and Intersection) for any slot content such as cards. Each top-level child in the slot becomes one slide.'
libraryOverrides:
  dependencies:
    - core/drupal
    - core/once
    - iobase/splide
    - iobase/splide_extension_auto_scroll
    - iobase/splide_extension_intersection
props:
  type: object
  properties:
    heading:
      type: string
      title: Heading
      description: 'Optional section title above the strip.'
    subheading:
      type: string
      title: Subheading
      description: 'Optional supporting line under the heading.'
slots:
  scrolling_content:
    title: 'Scrolling content'
    description: 'Place components (e.g. cards) here; each direct child becomes one slide. Splide AutoScroll runs continuously; Intersection pauses when off-screen.'
