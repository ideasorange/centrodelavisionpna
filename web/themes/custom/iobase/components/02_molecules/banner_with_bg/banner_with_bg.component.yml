'$schema': 'https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json'
name: Banner With Background
status: stable
description: Banner block with heading, subheading, and rich description.
libraryOverrides:
  dependencies:
    - core/drupal
props:
  type: object
  required:
    - heading
    - subheading
  properties:
    heading:
      type: string
      title: Heading
      description: Main heading text.
    subheading:
      type: string
      title: Subheading
      description: Supporting subheading text.
    background_variant:
      type: string
      title: Background variant
      description: Optional background color variant.
      enum:
        - none
        - light
        - dark
        - primary
        - secondary
      default: none
slots:
  description:
    title: Description
    description: Rich text / HTML description content.
