$schema: https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json
name: Tags List
status: stable
description: Displays a list of taxonomy tags.
props:
  type: object
  properties:
    items:
      type: array
      title: Tags
      items:
        type: object
        properties:
          name:
            type: string
          url:
            type: string
    label:
      type: string
      title: Label