$schema: 'https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json'
name: 'Card article'
status: stable
description: 'Article teaser card with image, linked title, and Read more link. Tags are supplied via the tags slot (e.g. iobase:tags_list).'
libraryOverrides:
  dependencies:
    - core/drupal
slots:
  tags:
    title: Tags
    description: 'Taxonomy or tag UI; nest the tags_list component or equivalent markup.'
props:
  type: object
  required:
    - title
    - url
  properties:
    field_image:
      type: string
      title: Image URL
      description: 'Teaser image URL (from field_image).'
    field_image_alt:
      type: string
      title: Image alt text
      description: 'Alt text for field_image.'
    title:
      type: string
      title: Title
      description: 'Article title; linked to the full node.'
    url:
      type: string
      title: URL
      description: 'Canonical URL of the article (title + Read more).'
    read_more_label:
      type: string
      title: 'Read more label'
      description: 'Text for the footer link (translated string recommended).'
      default: 'Read More'
