$schema: 'https://git.drupalcode.org/project/drupal/-/raw/10.1.x/core/modules/sdc/src/metadata.schema.json'
name: 'Card opinion'
status: stable
description: 'Testimonial card: optional star rating (from integer field_valoracion), quoted opinion text, customer name; large faint quotation mark behind the quote. For opinion nodes / UI Patterns / carousels.'
libraryOverrides:
  dependencies:
    - core/drupal
props:
  type: object
  required:
    - opinion
    - customer
  properties:
    valoracion:
      type: integer
      title: Valoración
      description: 'Positive star count mapped from node.field_valoracion (typically 1–5). Use 0 or omit to hide the star row.'
      minimum: 0
      maximum: 10
      default: 0
    opinion:
      type: string
      title: Opinion
      description: 'Quote body; plain text, max 256 characters when mapped from a field.'
      maxLength: 256
    customer:
      type: string
      title: Customer
      description: 'Attribution / patient name mapped from node title or a dedicated field.'
